# Triggered by PipeCraft after a GitHub Release is created (see create-release action).
# Requires repository secret: NPM_TOKEN (automation token with publish scope).
name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install and verify
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm run test
          pnpm run build

      - name: Publish
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
